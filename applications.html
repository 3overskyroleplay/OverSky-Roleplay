<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<title>Applications - OverSky Roleplay</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

header {
    text-align: center;
    padding: 40px;
    background: #111;
}

h1 {
    color: #00c3ff;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
    padding: 30px;
}

.card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
    background: #2a2a2a;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #00c3ff;
    color: black;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}
</style>

</head>

<body>

<header>
    <h1>OverSky Roleplay Applications</h1>
    <p>Choose a department to apply for</p>
</header>
