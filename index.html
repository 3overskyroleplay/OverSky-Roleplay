<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OverSky Roleplay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(20,20,20,0.9);
    position: sticky;
    top: 0;
}

.logo {
    font-weight: 700;
    color: #00c3ff;
    font-size: 20px;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    font-size: 14px;
    opacity: 0.8;
}

nav a:hover {
    opacity: 1;
    color: #00c3ff;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
}

.hero h1 {
    font-size: 55px;
    margin: 0;
    color: #00c3ff;
}

.hero p {
    font-size: 18px;
    opacity: 0.8;
    max-width: 600px;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #00c3ff;
    color: black;
    font-weight: bold;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

/* SECTIONS */
.section {
    padding: 60px 20px;
    text-align: center;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-top: 30px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
}

.card {
    background: #151515;
    padding: 20px;
    border-radius: 10px;
    transition: 0.2s;
}

.card:hover {
    background: #222;
    transform: translateY(-5px);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    font-size: 13px;
    opacity: 0.7;
}
</style>

</head>

<body>

<nav>
    <div class="logo">OverSky RP</div>
    <div>
        <a href="index.html">Home</a>
        <a href="rules.html">Rules</a>
        <a href="applications.html">Applications</a>
        <a href="https://discord.gg/9KGQpYKBsk" target="_blank">Discord</a>
    </div>
</nav>

<div class="hero">
    <h1>OverSky Roleplay</h1>
    <p>A serious FiveM roleplay community focused on realism, professionalism, and immersive experiences.</p>
    <a class="btn" href="https://discord.gg/9KGQpYKBsk">Join Our Discord</a>
</div>

<div class="section">
    <h2>Departments</h2>

```
<div class="cards">
    <div class="card">LSPD</div>
    <div class="card">BCSO</div>
    <div class="card">SASP</div>
    <div class="card">SAFD</div>
    <div class="card">SACG</div>
    <div class="card">CPP</div>
    <div class="card">SECURITY</div>
    <div class="card">SADOJ</div>
    <div class="card">SADOT</div>
</div>
```

</div>

<footer>
    © 2026 OverSky Roleplay | All Rights Reserved
</footer>

</body>
</html>
